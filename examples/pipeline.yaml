name: face_recognition

connectors:
  kafka:
    brokers: ["redpanda:9092"]
    schema_registry: "http://redpanda:8081"
    consumer_group: "intake-service"

  s3:
    endpoint: "http://minio:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    region: "us-east-1"
    bucket_notifications: "s3-bucket-notifications"

  postgres:
    database: "galadril_dev"
    host: "postgres:5432"
    user: "postgres"
    password: "postgres"

sources:
  - id: image_source
    match_pattern: "^images/" # detect every files in S3 images folder.
    topic: raw
    schema_path: schemas/avro/satellite.avsc

pipeline:
  - step: face_detection
    type: inference
    model: galadril_inference.models.face_recognition.FaceRecognitionModel
    artifact_path: /models/insightface/buffalo_l
    input_from: [image_source]
    params:
      threshold: 0.85
