name: face_recognition

connectors:
  kafka:
    brokers: ["redpanda:9092"]
    schema_registry: "http://redpanda:8081"
    consumer_group: "intake-service"

  s3:
    endpoint: "http://minio:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    region: "us-east-1"
    bucket_notifications: "s3-bucket-notifications"

  postgres:
    database: "galadril_dev"
    host: "postgres:5432"
    user: "postgres"
    password: "postgres"

sources:
  - id: image_source
    match_pattern: "^images/" # detect every files in S3 images folder.
    topic: raw
    schema_path: schemas/avro/satellite.avsc

pipeline:
  - step: face_detection
    type: inference
    model: galadril_inference.models.face_recognition.FaceRecognitionModel
    artifact_path: /models/insightface/buffalo_l
    input_from: [image_source]
    params:
      threshold: 0.85

  - step: face_matching
    type: flatten
    connector: postgres
    input_from: [face_detection]
    params:
      table_name: face_embeddings
      columns:
        - column_name: embedding # vector({dimensions}).
      limit: 1
      threshold: 0.8
      on_no_match: continue # continue to sink if person not known.

  - step: save_detected_face
    type: sink
    connector: postgres
    input_from: [face_matching]
    params:
      table_name: face_embeddings
      columns:
        - column_name: embedding
          data: $.input_from.face_detection # original vector savec on wrap.
        - column_name: metadata
          data: $.metadata # JSON metadata of file.
        - column_name: person_id
          data: $.input_from.face_matching.person_id
        - column_name: id
          data: $.input_from.face_matching.id
