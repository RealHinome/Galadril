<svg 
  viewBox="0 0 800 500" 
  preserveAspectRatio="xMidYMid meet" 
  class="w-full h-full opacity-95"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <filter id="ai-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="grad-data-in" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#9ca3af" stop-opacity="0" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.8" />
    </linearGradient>
  </defs>

  <g transform="translate(150, 50)">
    <rect x="0" y="0" width="500" height="400" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" shadow="0 4px 6px -1px rgba(0,0,0,0.1)"/>
    
    <text x="20" y="30" font-family="monospace" font-size="12" fill="#9ca3af">DOC_ID: PRODUCTION_REPORT.pdf</text>
    <rect x="20" y="45" width="460" height="1" fill="#e5e7eb"/>

    <g transform="translate(30, 80)" fill="none" stroke="#6b7280" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="0" x2="250" y2="0" stroke="#111827" stroke-width="6"/>
      
      <g transform="translate(0, 40)" opacity="0.7">
        <line x1="0" y1="0" x2="400" y2="0"/>
        <line x1="0" y1="20" x2="380" y2="20"/>
        <line x1="0" y1="40" x2="200" y2="40"/>
      </g>

      <g transform="translate(0, 110)">
        <line x1="0" y1="0" x2="410" y2="0" stroke="#3b82f6" stroke-width="4">
           <animate attributeName="stroke-dasharray" from="0,410" to="410,0" dur="1.5s" fill="freeze" />
        </line>
        <line x1="0" y1="25" x2="150" y2="25" stroke="#3b82f6" stroke-width="4">
          <animate attributeName="stroke-dasharray" from="0,150" to="150,0" dur="1s" begin="1s" fill="freeze" />
        </line>

        <rect x="155" y="15" width="2" height="20" fill="#3b82f6" filter="url(#ai-glow)">
          <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
          <animate attributeName="x" values="155;300;155" dur="4s" begin="1s" repeatCount="indefinite" />
        </rect>
      </g>
      
      <g transform="translate(0, 190)" opacity="0.3">
        <line x1="0" y1="0" x2="400" y2="0"/>
        <line x1="0" y1="20" x2="250" y2="20"/>
      </g>
    </g>
  </g>

  <g transform="translate(30, 200)" font-family="monospace" font-size="9" fill="#9ca3af">
    <text x="0" y="0">PROMPT_IN</text>
    <path d="M 0 10 L 80 10 L 100 30 L 80 50 L 0 50 Z" fill="none" stroke="url(#grad-data-in)" stroke-width="1.5"/>
    <text x="15" y="33" fill="#3b82f6" font-size="8">{CONTEXT_DATA}</text>

    <g filter="url(#ai-glow)">
      <circle r="2" fill="#3b82f6">
        <animateMotion dur="2s" repeatCount="indefinite" path="M100,30 L250,230" />
      </circle>
      <circle r="1.5" fill="#3b82f6" opacity="0.6">
        <animateMotion dur="2.5s" begin="0.5s" repeatCount="indefinite" path="M100,30 L250,180" />
      </circle>
       <circle r="1.5" fill="#3b82f6" opacity="0.4">
        <animateMotion dur="1.8s" begin="1s" repeatCount="indefinite" path="M100,30 L250,260" />
      </circle>
    </g>
  </g>

  <g transform="translate(20, 460)" font-family="monospace" font-size="10" fill="#6b7280">
    <text x="0" y="0">MODEL: <tspan fill="#3b82f6">MINISTRAL3</tspan></text>
    <text x="0" y="15">TOKENS/S: 128</text>
    <text x="0" y="30">STATUS: <tspan fill="#10b981">GENERATING</tspan></text>
  </g>

</svg>