<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <style>
        .drone-pulse {
            animation: pulse 2s infinite;
            transform-origin: center;
        }
        @keyframes pulse {
            0% { r: 5; opacity: 0.8; }
            100% { r: 15; opacity: 0; }
        }
        .data-stream {
            animation: dash 5s linear infinite;
        }
        @keyframes dash {
            from { stroke-dashoffset: 40; }
            to { stroke-dashoffset: 0; }
        }
    </style>
    
    <defs>
        <g id="mini-drone">
            <circle cx="0" cy="0" r="4" fill="white" />
            <circle cx="0" cy="0" r="1.5" fill="black" />
            <line x1="-6" y1="-6" x2="6" y2="6" stroke="white" stroke-width="1.5" />
            <line x1="-6" y1="6" x2="6" y2="-6" stroke="white" stroke-width="1.5" />
            <circle cx="-6" cy="-6" r="3" fill="none" stroke="white" stroke-width="0.5" />
            <circle cx="6" cy="6" r="3" fill="none" stroke="white" stroke-width="0.5" />
            <circle cx="-6" cy="6" r="3" fill="none" stroke="white" stroke-width="0.5" />
            <circle cx="6" cy="-6" r="3" fill="none" stroke="white" stroke-width="0.5" />
        </g>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <path
        d="M 100 150 L 200 80 L 300 130 L 250 230 L 150 220 Z M 200 80 L 250 230"
        fill="none"
        stroke="white"
        stroke-width="0.5"
        stroke-opacity="0.2"
    />

    <path
        d="M 100 150 L 200 80 L 300 130 L 250 230 L 150 220 Z M 200 80 L 250 230"
        fill="none"
        stroke="#4ade80"
        stroke-width="1"
        stroke-dasharray="8 32"
        class="data-stream"
        filter="url(#glow)"
    />

    <g transform="translate(100, 150)">
        <circle cx="0" cy="0" r="10" stroke="#4ade80" stroke-width="1" fill="none" class="drone-pulse" />
        <use href="#mini-drone" />
    </g>
    <g transform="translate(200, 80)">
        <circle cx="0" cy="0" r="10" stroke="#60a5fa" stroke-width="1" fill="none" class="drone-pulse" />
        <use href="#mini-drone" />
    </g>
    <g transform="translate(300, 130)">
        <circle cx="0" cy="0" r="10" stroke="#4ade80" stroke-width="1" fill="none" class="drone-pulse" />
        <use href="#mini-drone" />
    </g>
    <g transform="translate(250, 230)">
        <use href="#mini-drone" />
    </g>
    <g transform="translate(150, 220)">
        <use href="#mini-drone" />
    </g>
</svg>
