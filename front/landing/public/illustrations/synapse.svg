<svg 
  viewBox="0 0 800 500" 
  preserveAspectRatio="xMidYMid slice" 
  class="w-full h-full"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ca3af" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#9ca3af" stop-opacity="0.1" />
    </linearGradient>

    <circle id="data-pulse" r="1.5" fill="#3b82f6" />
  </defs>

  <g stroke="url(#line-grad)" stroke-width="0.5" fill="none">
    <path d="M50,100 L200,50 L400,120 L600,40 L750,150 L650,300 L780,420 L400,450 L100,400 L50,100" opacity="0.4" />
    <path d="M200,50 L400,250 L100,400 M600,40 L400,250 L650,300 M400,120 L400,450" opacity="0.3" />
    
    <path d="M50,250 L150,200 L300,280 L400,250 L550,320 L700,250" stroke-dasharray="2,2" />
    <path d="M100,50 L250,150 L400,250 L600,350 L750,450" opacity="0.2" />
  </g>

  <g fill="#9ca3af" filter="url(#node-glow)">
    <circle cx="80" cy="120" r="3" /> <circle cx="120" cy="380" r="3" />
    <rect x="700" y="80" width="6" height="6" rx="1" /> <rect x="50" y="320" width="6" height="6" rx="1" />
    <rect x="400" y="40" width="5" height="5" transform="rotate(45 400 40)" /> 
    <rect x="750" y="350" width="5" height="5" transform="rotate(45 750 350)" />
  </g>

  <g>
    <path id="path1" d="M400,40 L400,150 L400,250" fill="none" />
    <use href="#data-pulse">
      <animateMotion dur="3s" repeatCount="indefinite" path="M400,40 L400,150 L400,250" />
    </use>

    <use href="#data-pulse">
      <animateMotion dur="4s" repeatCount="indefinite" path="M700,80 L550,180 L400,250" />
    </use>

    <use href="#data-pulse">
      <animateMotion dur="2.5s" begin="1s" repeatCount="indefinite" path="M120,380 L280,320 L400,250" />
    </use>

    <use href="#data-pulse">
      <animateMotion dur="5s" repeatCount="indefinite" path="M50,320 L150,280 L300,260 L400,250" />
    </use>
  </g>

  <g transform="translate(400, 250)">
    <circle r="40" fill="#3b82f6" opacity="0.05">
        <animate attributeName="r" values="35;45;35" dur="4s" repeatCount="indefinite" />
    </circle>
    
    <circle r="18" fill="white" stroke="#3b82f6" stroke-width="2" />
    
    <circle r="8" fill="#3b82f6">
      <animate attributeName="r" values="6;9;6" dur="0.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;1;0.8" dur="0.8s" repeatCount="indefinite" />
    </circle>

    <circle r="60" stroke="#3b82f6" stroke-width="0.5" fill="none" opacity="0.2" />
  </g>

  <g font-family="monospace" font-size="8" fill="#9ca3af" opacity="0.6">
    <text x="415" y="45">SATELLITE_01</text>
    <text x="715" y="90">HQ_ESTATE</text>
    <text x="40" y="340">LOG_HUB</text>
    <text x="415" y="240" fill="#3b82f6" font-weight="bold">SYNAPSE_CORE</text>
  </g>
</svg>