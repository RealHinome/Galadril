<svg 
  viewBox="0 0 800 500" 
  preserveAspectRatio="xMidYMid slice" 
  class="w-full h-full opacity-90"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="grad-warning-organic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="grad-danger-organic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0" />
    </linearGradient>

    <filter id="line-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g stroke="#e5e7eb" stroke-width="0.5" opacity="0.3">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" />
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" />
  </g>

  <rect x="300" y="50" width="100" height="400" fill="url(#grad-warning-organic)" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" dur="0.2s" begin="2.25s" fill="freeze" />
  </rect>
  
  <rect x="580" y="50" width="120" height="400" fill="url(#grad-danger-organic)" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" dur="0.2s" begin="4.35s" fill="freeze" />
  </rect>

  <path 
    id="main-curve"
    d="M0,350 L40,345 L60,355 L100,340 L130,360 L160,330 L190,345 L220,310 L250,325 
       L280,340 L310,220 L330,260 L350,180 L380,210 L410,320 L440,335 L470,345 L500,330 
       L530,350 L560,320 L590,120 L610,180 L630,60 L650,140 L680,90 L710,340 L750,345 L800,350" 
    fill="none" 
    stroke="#3b82f6" 
    stroke-width="2" 
    filter="url(#line-glow)"
    stroke-linejoin="round"
    stroke-dasharray="1500"
    stroke-dashoffset="1500"
  >
    <animate 
      id="trace-anim"
      attributeName="stroke-dashoffset" 
      from="1500" 
      to="0" 
      dur="6s" 
      fill="freeze" 
      begin="0s"
    />
  </path>

  <g font-family="monospace" font-size="10" font-weight="bold">
    
    <g transform="translate(350, 180)" opacity="0">
      <circle r="4" fill="#f59e0b">
        <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite" begin="2.625s" />
      </circle>
      <text x="10" y="-10" fill="#d97706">ANM_042</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="2.625s" fill="freeze" />
    </g>

    <g transform="translate(630, 60)" opacity="0">
      <circle r="5" fill="#ef4444">
        <animate attributeName="opacity" values="1;0.2;1" dur="0.6s" repeatCount="indefinite" begin="4.725s" />
      </circle>
      <text x="10" y="-10" fill="#dc2626">CRIT_THRESHOLD_EXCEEDED</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="4.725s" fill="freeze" />
    </g>
  </g>

  <g transform="translate(20, 40)" font-family="monospace" font-size="11" fill="#6b7280">
    <text x="0" y="0">STATUS: <tspan fill="#10b981">LIVE ANALYTICS</tspan></text>
    <text x="0" y="20">VOLATILITY: 14.2%</text>
    <rect x="0" y="30" width="100" height="2" fill="#e5e7eb" />
    <rect x="0" y="30" width="65" height="2" fill="#3b82f6">
        <animate attributeName="width" values="65;85;65" dur="4s" repeatCount="indefinite" />
    </rect>
  </g>

  <line x1="0" y1="50" x2="0" y2="450" stroke="#3b82f6" stroke-width="1" opacity="0.3">
    <animate attributeName="x1" from="0" to="800" dur="6s" begin="0s" fill="freeze" />
    <animate attributeName="x2" from="0" to="800" dur="6s" begin="0s" fill="freeze" />
  </line>

</svg>