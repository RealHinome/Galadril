<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e0e0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#999999;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#777777;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path d="M250 100 L150 160 L150 340 L250 400 Z" fill="url(#glassSide)" stroke="#d1d1d1" stroke-width="1"/>
    
    <path d="M250 100 L350 160 L350 340 L250 400 Z" fill="url(#metalSide)" stroke="#b0b0b0" stroke-width="1"/>
    
    <line x1="250" y1="100" x2="250" y2="400" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    
    <path d="M150 160 L250 200 L350 160" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <path d="M150 340 L250 300 L350 340" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  </g>
  
</svg>