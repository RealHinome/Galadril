[project]
name = "galadril"
version = "0.1.0"
description = "All Galadril services."
dependencies = [
    "numpy>=2.4.2",
    "opentelemetry-api>=1.39.1",
    "opentelemetry-exporter-otlp>=1.39.1",
    "opentelemetry-sdk>=1.39.1",
    "structlog>=25.5.0",
    "insightface>=0.7.3",
    "onnxruntime>=1.24.2",
    "boto3>=1.35",
    "boto3-stubs[s3]",
    "moto[s3]>=5.0",
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "pytest-tmp-files>=0.0.2",
]
requires-python = "==3.13.*"

[tool.uv.workspace]
members = [
    "machine-learning/*",
    "platform/*",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "ruff>=0.15.2",
]

[tool.ruff]
target-version = "py312"
line-length = 80

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
